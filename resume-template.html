<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Chelsea Rittenmyer — Resume</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=Montserrat:wght@300;400;500;600&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --bg: #f7f4f0;
                --bg2: #eeeae4;
                --ink: #0d1f2d;
                --ink-mid: #4a5a66;
                --ink-soft: #8a9aa6;
                --teal: #1a8fa3;
                --seafoam: #4ecdc4;
                --rule: rgba(13, 31, 45, 0.1);
                --hero-bg: #0a1a24;
            }

            *,
            *::before,
            *::after {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background: #fff;
                color: var(--ink);
                font-family: "Montserrat", sans-serif;
                font-size: 13px;
                line-height: 1.6;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            /* ── PAGE SHELL ── */
            .page {
                width: 850px;
                min-height: 1100px;
                margin: 0 auto;
                background: #fff;
                box-shadow: 0 4px 40px rgba(0, 0, 0, 0.12);
            }

            /* ── HEADER ── */
            header {
                background: #fff;
                padding: 32px 45px 28px 45px;
                position: relative;
                overflow: hidden;
                display: flex;
                align-items: center;
                justify-content: flex-start;
                gap: 18px;
            }

            header::before {
                display: none;
            }

            /* Teal bottom accent line */
            header::after {
                content: "";
                position: absolute;
                bottom: 0;
                left: 0;
                right: 0;
                height: 2px;
                background: linear-gradient(
                    90deg,
                    var(--teal) 0%,
                    var(--seafoam) 50%,
                    transparent 100%
                );
            }

            /* ── LOGO / NAME LOCKUP ── */
            .name-lockup {
                position: relative;
                z-index: 1;
                flex-shrink: 0;
            }

            .name-chelsea {
                font-family: "Playfair Display", serif;
                font-size: 72px;
                font-style: italic;
                font-weight: 900;
                color: #0a1a24;
                line-height: 0.9;
                letter-spacing: -0.01em;
                position: relative;
                display: inline-block;
            }

            .name-chelsea::after {
                display: none;
            }

            .name-rittenmyer {
                font-family: "Montserrat", sans-serif;
                font-size: 17.5px;
                font-weight: 500;
                color: var(--ink-soft);
                letter-spacing: 0.48em;
                text-transform: uppercase;
                margin-top: 1px;
                text-align: center;
            }

            /* ── HEADER RIGHT ── */
            .header-right {
                position: relative;
                z-index: 1;
                text-align: right;
                flex: 1;
            }

            .header-title {
                font-family: "Montserrat", sans-serif;
                font-size: 10pt;
                font-weight: 700;
                letter-spacing: 0.18em;
                text-transform: uppercase;
                color: var(--seafoam);
                margin-bottom: 8px;
            }

            .header-tagline {
                font-size: 9.5px;
                font-weight: 500;
                color: var(--ink-mid);
                margin-bottom: 14px;
                letter-spacing: 0.02em;
            }

            .header-contacts {
                display: flex;
                flex-wrap: wrap;
                gap: 4px 0;
                justify-content: flex-end;
            }

            .contact-item {
                font-size: 11px;
                font-weight: 500;
                color: var(--ink-mid);
                letter-spacing: 0.02em;
            }

            .contact-sep {
                color: var(--seafoam);
                margin: 0 7px;
                font-size: 10px;
            }

            /* ── BODY ── */
            .body {
                display: grid;
                grid-template-columns: 220px 1fr;
                min-height: 960px;
            }

            /* ── LEFT SIDEBAR ── */
            .sidebar {
                background: #fafaf9;
                padding: 32px 24px 32px 28px;
                border-right: 1px solid var(--rule);
            }

            /* ── RIGHT MAIN ── */
            .main {
                background: #fff;
                padding: 32px 36px 32px 32px;
            }

            /* ── SECTION LABELS ── */
            .section-label {
                font-size: 7px;
                font-weight: 600;
                letter-spacing: 0.42em;
                text-transform: uppercase;
                color: var(--teal);
                margin-bottom: 6px;
            }

            .section-rule {
                height: 1px;
                background: var(--rule);
                margin-bottom: 14px;
            }

            .sidebar-section {
                margin-bottom: 26px;
            }
            .main-section {
                margin-bottom: 24px;
            }

            /* ── SKILL LIST ── */
            .skill-list {
                list-style: none;
            }

            .skill-list li {
                font-size: 11px;
                font-weight: 400;
                color: var(--ink-mid);
                padding: 4px 0;
                border-bottom: 1px solid var(--rule);
                display: flex;
                align-items: center;
                gap: 7px;
            }

            .skill-list li:last-child {
                border-bottom: none;
            }

            .skill-list li.skill-group-break {
                margin-top: 8px;
            }

            .skill-dot {
                width: 4px;
                height: 4px;
                border-radius: 50%;
                background: var(--teal);
                flex-shrink: 0;
            }

            /* ── SIDEBAR EDU / AWARDS ── */
            .sidebar-card {
                background: var(--bg2);
                border-left: 2px solid var(--teal);
                padding: 10px 12px;
                margin-bottom: 10px;
                border-radius: 0 4px 4px 0;
            }

            .sidebar-card-title {
                font-family: "Playfair Display", serif;
                font-size: 12px;
                font-weight: 700;
                color: var(--ink);
                margin-bottom: 2px;
            }

            .sidebar-card-sub {
                font-size: 9.5px;
                font-weight: 500;
                color: var(--ink-mid);
                line-height: 1.6;
            }

            .sidebar-card-date {
                font-size: 9px;
                font-weight: 600;
                color: var(--teal);
                margin-top: 4px;
                letter-spacing: 0.05em;
            }

            /* ── PROFILE SUMMARY ── */
            .profile-text {
                font-size: 11.5px;
                font-weight: 400;
                color: var(--ink-mid);
                line-height: 1.85;
            }

            .profile-accent {
                display: block;
                width: 32px;
                height: 2px;
                background: var(--seafoam);
                margin-top: 12px;
            }

            /* ── EXPERIENCE BLOCK ── */
            .exp-block {
                margin-bottom: 20px;
                padding-bottom: 20px;
                border-bottom: 1px solid var(--rule);
            }
            .exp-block:last-child {
                border-bottom: none;
                margin-bottom: 0;
            }

            .exp-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 12px;
                margin-bottom: 5px;
            }

            .exp-logo-name {
                display: flex;
                align-items: center;
                gap: 10px;
            }

            /* Company logo badges */
            .logo-badge {
                height: 22px;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 4px;
                padding: 0 7px;
                flex-shrink: 0;
            }

            .logo-img {
                display: block;
                object-fit: contain;
                flex-shrink: 0;
            }

            .logo-img-amazon {
                height: 46px;
                width: auto;
                max-width: 130px;
            }

            .logo-img-ninjas {
                height: 36px;
                width: auto;
            }

            .logo-cl {
                background: transparent;
                border: none;
                padding: 0;
                gap: 6px;
                align-items: center;
            }

            /* 4-square CRLV grid */
            .cl-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                grid-template-rows: 1fr 1fr;
                gap: 2.5px;
                width: 32px;
                height: 32px;
                background: #111;
                padding: 3.5px;
                border-radius: 3px;
                flex-shrink: 0;
            }

            .cl-grid span {
                background: #fff;
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: "Montserrat", sans-serif;
                font-size: 7px;
                font-weight: 800;
                color: #111;
                border-radius: 1px;
                line-height: 1;
            }

            .logo-cl-name {
                font-family: "Montserrat", sans-serif;
                font-size: 11px;
                font-weight: 700;
                color: var(--ink);
                letter-spacing: 0.01em;
            }

            .exp-company {
                font-family: "Playfair Display", serif;
                font-size: 14px;
                font-weight: 700;
                color: var(--ink);
                line-height: 1.1;
            }

            .exp-date {
                font-size: 9px;
                font-weight: 600;
                color: var(--teal);
                background: rgba(26, 143, 163, 0.09);
                padding: 3px 8px;
                border-radius: 20px;
                white-space: nowrap;
                flex-shrink: 0;
                letter-spacing: 0.04em;
            }

            .exp-role {
                font-family: "Playfair Display", serif;
                font-size: 11px;
                font-style: italic;
                font-weight: 400;
                color: var(--ink-mid);
                margin-bottom: 8px;
            }

            .exp-bullets {
                list-style: none;
                display: flex;
                flex-direction: column;
                gap: 4px;
            }

            .exp-bullets li {
                font-size: 11px;
                font-weight: 400;
                color: var(--ink-mid);
                line-height: 1.6;
                position: relative;
                padding-left: 14px;
            }

            .exp-bullets li::before {
                content: "–";
                color: var(--seafoam);
                font-weight: 600;
                position: absolute;
                left: 0;
                top: 0;
            }

            /* ── EARLIER CAREER ── */
            .earlier-list {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 10px 24px;
            }

            .earlier-item {
                display: flex;
                gap: 10px;
                align-items: flex-start;
            }

            .earlier-emoji {
                font-size: 14px;
                line-height: 1;
                flex-shrink: 0;
                margin-top: 1px;
            }

            .earlier-text {
            }
            .earlier-role {
                font-size: 11px;
                font-weight: 500;
                color: var(--ink);
                line-height: 1.3;
            }
            .earlier-co {
                font-size: 9.5px;
                color: var(--ink-soft);
                margin-top: 1px;
            }

            /* ── FOOTER ── */
            footer {
                background: #fff;
                padding: 12px 48px;
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 6px;
                border-top: 1.5px solid var(--rule);
            }

            .footer-item {
                font-size: 9px;
                font-weight: 400;
                color: var(--ink-soft);
                letter-spacing: 0.03em;
            }

            .footer-sep {
                color: var(--seafoam);
                font-size: 9px;
            }

            /* ── PRINT ── */
            @media print {
                body {
                    background: #fff;
                }
                .page {
                    box-shadow: none;
                    width: 100%;
                }
                @page {
                    margin: 0;
                    size: letter;
                }
            }

            @media screen {
                body {
                    background: #ddd;
                    padding: 32px 0 64px;
                }
            }
        </style>
    </head>
    <body>
        <div style="width: 850px; margin: 0 auto; display: flex; justify-content: flex-end; padding: 10px 0 4px;">
            <a
                href="CrittenmyerResume2026-1page.pdf"
                download
                style="
                    display: inline-flex;
                    align-items: center;
                    gap: 6px;
                    background: #1a8fa3;
                    color: #fff;
                    font-family: 'Montserrat', sans-serif;
                    font-size: 10px;
                    font-weight: 600;
                    letter-spacing: 0.08em;
                    text-transform: uppercase;
                    text-decoration: none;
                    padding: 7px 14px;
                    border-radius: 4px;
                    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
                "
            >↓ Download PDF</a>
        </div>
        <div class="page">
            <!-- ══ HEADER ══ -->
            <header>
                <div class="name-lockup">
                    <div class="name-chelsea" id="headerFirstName">Chelsea</div>
                    <div class="name-rittenmyer" id="headerLastName">Rittenmyer</div>
                </div>
                <div class="header-right">
                    <div class="header-title" id="headerTitle">Creative Director · Content Strategy & Multimedia Production</div>
                    <div class="header-tagline" id="headerTagline">Multimedia Production & Creative Direction  ·  Customer Education  ·  Brand Storytelling</div>
                    <div class="header-contacts" id="headerContacts"></div>
                </div>
            </header>

            <!-- ══ BODY ══ -->
            <div class="body">
                <!-- ── SIDEBAR ── -->
                <aside class="sidebar">
                    <div class="sidebar-section" id="profileImageSection">
                        <img id="profileImage" src="assets/images/chelsea-hero.jpg" alt="Chelsea Rittenmyer" style="width: 100%; border-radius: 4px; display: block;"/>
                    </div>

                    <div class="sidebar-section" id="skillsSection"></div>
                    <div class="sidebar-section" id="toolsSection"></div>
                    <div class="sidebar-section" id="educationSection"></div>
                    <div class="sidebar-section" id="honorsSection"></div>
                </aside>

                <!-- ── MAIN ── -->
                <main class="main">
                    <!-- Profile -->
                    <div class="main-section" id="profileSection">
                        <div class="section-label">Profile</div>
                        <div class="section-rule"></div>
                        <p class="profile-text" id="profileText"></p>
                        <span class="profile-accent"></span>
                    </div>

                    <!-- Experience -->
                    <div class="main-section" id="experienceSection">
                        <div class="section-label">Experience</div>
                        <div class="section-rule"></div>
                        <div id="experienceList"></div>
                    </div>

                    <!-- Earlier Career -->
                    <div class="main-section" id="earlierCareerSection">
                        <div class="section-label">Earlier Career</div>
                        <div class="section-rule"></div>
                        <div class="earlier-list" id="earlierCareerList"></div>
                    </div>
                </main>
            </div>

            <!-- ══ FOOTER ══ -->
            <footer id="footer"></footer>
        </div>

        <script>
            // Load and populate resume from JSON
            async function loadResume() {
                try {
                    const response = await fetch('resume-data.json');
                    const data = await response.json();
                    populateResume(data);
                } catch (error) {
                    console.error('Error loading resume data:', error);
                }
            }

            function populateResume(data) {
                const { personal, profile, skills, education, honors, experience, earlierCareer } = data;

                // ── HEADER ──
                document.getElementById('headerFirstName').textContent = personal.firstName;
                document.getElementById('headerLastName').textContent = personal.lastName;
                document.getElementById('headerTitle').textContent = personal.title;
                document.getElementById('headerTagline').innerHTML = personal.tagline;
                document.getElementById('profileImage').src = personal.profileImage;

                // Header contacts
                const contactsHtml = `
                    <span class="contact-item">${personal.location}</span>
                    <span class="contact-sep">·</span>
                    <span class="contact-item"><a href="${personal.websiteUrl}" target="_blank" rel="noopener" style="color: var(--teal); font-weight: 600">www.${personal.website}</a></span>
                    <span class="contact-sep">·</span>
                    <span class="contact-item"><a href="${personal.emailUrl}" style="color: var(--teal); font-weight: 600">${personal.email}</a></span>
                    <span class="contact-sep">·</span>
                    <span class="contact-item"><a href="${personal.linkedin}" target="_blank" rel="noopener" style="color: var(--teal); font-weight: 600">LinkedIn ↗</a></span>
                `;
                document.getElementById('headerContacts').innerHTML = contactsHtml;

                // ── PROFILE ──
                document.getElementById('profileText').innerHTML = profile.text;

                // ── SKILLS ──
                const skillsHtml = skills.map((skillGroup, groupIndex) => {
                    const skillItemsHtml = skillGroup.items.map((skill, itemIndex) => {
                        const isBreak = itemIndex > 0 && [4, 9].includes(itemIndex) && groupIndex === 0;
                        return `<li${isBreak ? ' class="skill-group-break"' : ''}><span class="skill-dot"></span>${skill}</li>`;
                    }).join('');

                    return `
                        <div class="sidebar-section">
                            <div class="section-label">${skillGroup.category}</div>
                            <div class="section-rule"></div>
                            <ul class="skill-list">${skillItemsHtml}</ul>
                        </div>
                    `;
                }).join('');

                const skillsSectionParent = document.getElementById('skillsSection').parentElement;
                skillsSectionParent.innerHTML = skillsHtml + skillsSectionParent.innerHTML;
                document.getElementById('skillsSection').remove();

                // ── EDUCATION ──
                const educationHtml = education.map(edu => `
                    <div class="sidebar-card">
                        <div class="sidebar-card-title">${edu.institution}</div>
                        <div class="sidebar-card-sub">${edu.degree} · ${edu.field}<br/>${edu.additional}</div>
                        <div class="sidebar-card-date">${edu.year}</div>
                    </div>
                `).join('');

                let educationSection = document.getElementById('educationSection');
                educationSection.innerHTML = `
                    <div class="section-label">Education</div>
                    <div class="section-rule"></div>
                    ${educationHtml}
                `;

                // ── HONORS ──
                const honorsHtml = honors.map(honor => `
                    <div class="sidebar-card">
                        <div class="sidebar-card-title">${honor.title}</div>
                        <div class="sidebar-card-sub">${honor.organization}</div>
                    </div>
                `).join('');

                let honorsSection = document.getElementById('honorsSection');
                honorsSection.innerHTML = `
                    <div class="section-label">Honors</div>
                    <div class="section-rule"></div>
                    ${honorsHtml}
                `;

                // ── EXPERIENCE ──
                const experienceHtml = experience.map(job => {
                    let logoHtml = '';
                    if (job.logoType === 'image') {
                        logoHtml = `<img src="${job.companyLogo}" alt="${job.company}" class="logo-img${job.company === 'Amazon' ? ' logo-img-amazon' : job.company === 'Code Ninjas' ? ' logo-img-ninjas' : ''}"/>`;
                    } else if (job.logoType === 'custom') {
                        logoHtml = `
                            <div class="logo-badge logo-cl">
                                <div class="cl-grid">
                                    <span>C</span><span>R</span><span>L</span><span>V</span>
                                </div>
                                <span class="logo-cl-name">CreativeLive</span>
                            </div>
                        `;
                    }

                    const bulletsHtml = job.bullets.map(bullet => `<li>${bullet}</li>`).join('');

                    return `
                        <div class="exp-block">
                            <div class="exp-header">
                                <div class="exp-logo-name">${logoHtml}</div>
                                <span class="exp-date">${job.dateRange}</span>
                            </div>
                            <div class="exp-role">${job.position}</div>
                            <ul class="exp-bullets">${bulletsHtml}</ul>
                        </div>
                    `;
                }).join('');

                document.getElementById('experienceList').innerHTML = experienceHtml;

                // ── EARLIER CAREER ──
                const earlierHtml = earlierCareer.map(job => `
                    <div class="earlier-item">
                        <span class="earlier-emoji">${job.emoji}</span>
                        <div class="earlier-text">
                            <div class="earlier-role">${job.position}</div>
                            <div class="earlier-co">${job.company} · ${job.dateRange}</div>
                        </div>
                    </div>
                `).join('');

                document.getElementById('earlierCareerList').innerHTML = earlierHtml;

                // ── FOOTER ──
                const footerHtml = `
                    <span class="footer-item"><a href="${personal.emailUrl}" style="color: var(--teal); text-decoration: none;">${personal.email}</a></span>
                    <span class="footer-sep">·</span>
                    <span class="footer-item"><a href="${personal.websiteUrl}" target="_blank" rel="noopener" style="color: var(--teal); text-decoration: none;">${personal.website}</a></span>
                    <span class="footer-sep">·</span>
                    <span class="footer-item">${personal.phone}</span>
                `;
                document.getElementById('footer').innerHTML = footerHtml;
            }

            // Load resume when page loads
            window.addEventListener('DOMContentLoaded', loadResume);
        </script>
    </body>
</html>
